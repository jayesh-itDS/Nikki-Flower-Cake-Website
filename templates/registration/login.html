{% extends "base.html" %}

{% block title %}Sign in | Nikki Flower &amp; Cake{% endblock %}

{% block content %}
  <div class="mx-auto mt-10 max-w-md rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
    <h1 class="mb-4 text-xl font-semibold text-slate-900">Welcome back</h1>
    <p class="mb-6 text-sm text-slate-500">
      Sign in with your email, phone, or username to manage orders and wishlists.
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div class="space-y-1">
        <label class="block text-sm font-medium text-slate-700">Email / Phone / Username</label>
        <input
          type="text"
          name="username"
          class="w-full rounded-2xl border border-slate-200 px-3 py-2 text-sm focus:border-rose-500 focus:ring-2 focus:ring-rose-500/40"
          required
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm font-medium text-slate-700">Password</label>
        <input
          type="password"
          name="password"
          class="w-full rounded-2xl border border-slate-200 px-3 py-2 text-sm focus:border-rose-500 focus:ring-2 focus:ring-rose-500/40"
          required
        />
      </div>

      <button
        type="submit"
        class="mt-3 w-full rounded-full bg-rose-500 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-rose-500/40"
      >
        Sign in
      </button>
    </form>
  </div>
{% endblock %}
